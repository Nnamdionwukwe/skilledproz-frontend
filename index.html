<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#080810" />
    <title>SkilledProz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Hide every piece of Google Translate UI */
      .goog-te-banner-frame,
      .goog-te-menu-frame,
      .goog-te-balloon-frame,
      .goog-te-gadget,
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-aZ2wEe,
      .skiptranslate,
      #google_translate_element,
      iframe.skiptranslate {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        overflow: hidden !important;
      }
      body {
        top: 0 !important;
        position: static !important;
        overflow-x: hidden;
      }
      html {
        overflow-x: hidden;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      /* Prevent iOS zoom */
      input,
      textarea,
      select {
        font-size: 16px !important;
      }
    </style>

    <!-- Prevent GT from shifting body down — runs synchronously before GT loads -->
    <script>
      (function () {
        function fix() {
          if (
            document.body &&
            document.body.style.top &&
            document.body.style.top !== "0px"
          ) {
            document.body.style.top = "0px";
          }
        }
        setInterval(fix, 100);
        document.addEventListener("DOMContentLoaded", fix);
      })();
    </script>
  </head>
  <body>
    <!-- GT initialises here, reads the googtrans cookie automatically -->
    <div
      id="google_translate_element"
      style="display: none; height: 0; overflow: hidden"
    ></div>
    <script>
      function googleTranslateElementInit() {
        try {
          new google.translate.TranslateElement(
            { pageLanguage: "en", autoDisplay: false },
            "google_translate_element",
          );
        } catch (e) {}
      }
    </script>
    <script
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      async
      defer
    ></script>

    <!-- Change the root div -->
    <div id="root" translate="no" class="notranslate"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
