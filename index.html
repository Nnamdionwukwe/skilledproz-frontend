<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkilledProz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Hide ALL Google Translate UI — every class GT uses ── */
      .goog-te-banner-frame,
      .goog-te-menu-frame,
      .goog-te-balloon-frame,
      .goog-te-gadget,
      .goog-te-gadget-icon,
      .goog-logo-link,
      #goog-gt-tt,
      #goog-gt-,
      .goog-gt-score-img,
      .goog-te-spinner,
      /* The floating badge that appears top-left */
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf,
      .VIpgJd-ZVi9od-aZ2wEe,
      .VIpgJd-ZVi9od-l4eHX-hSRGPd,
      /* The "select language" bar that injects at top */
      .skiptranslate,
      #google_translate_element,
      /* Any iframe GT injects */
      iframe.skiptranslate {
        display: none !important;
        visibility: hidden !important;
        height: 0 !important;
        overflow: hidden !important;
      }
      /* Prevent GT from pushing body down */
      body {
        top: 0 !important;
        position: static !important;
        min-height: 100vh;
      }
      /* Prevent iOS zoom on input focus */
      input,
      textarea,
      select {
        font-size: 16px !important;
      }
    </style>
  </head>
  <body>
    <!-- GT element — hidden, used programmatically only -->
    <div
      id="google_translate_element"
      style="display: none; visibility: hidden; height: 0; overflow: hidden"
    ></div>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: "en", autoDisplay: false },
          "google_translate_element",
        );
      }
    </script>
    <script
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      async
    ></script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
